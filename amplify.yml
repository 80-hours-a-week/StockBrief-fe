version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 24
        - nvm use 24
        - corepack enable
        - corepack prepare pnpm@11.7.0 --activate
        - node -v
        - pnpm install --frozen-lockfile --store-dir .pnpm-store
    build:
      commands:
        - node -v
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - .pnpm-store/**/*
